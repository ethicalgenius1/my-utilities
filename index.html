<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Web OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="desktop">
  <div class="icon" onclick="openApp('notes')">📝 Notes</div>
  <div class="icon" onclick="openApp('todo')">✅ To-Do</div>
  <div class="icon" onclick="openApp('calc')">🧮 Calc</div>
  <div class="icon" onclick="openApp('weather')">🌤️ Weather</div>
  <div class="icon" onclick="openApp('base64')">🔐 Base64</div>
  <div class="icon" onclick="openApp('ai')">🧠 AI</div>
</div>

<!-- WINDOWS -->

<div id="notes" class="window">
  <div class="titlebar" onmousedown="dragStart(event,this.parentElement)">
    Notes <button onclick="closeApp('notes')">X</button>
  </div>
  <div class="content">
    <textarea id="notesArea"></textarea>
    <button onclick="saveNotes()">Save</button>
  </div>
</div>

<div id="todo" class="window">
  <div class="titlebar" onmousedown="dragStart(event,this.parentElement)">
    To-Do <button onclick="closeApp('todo')">X</button>
  </div>
  <div class="content">
    <input id="todoInput">
    <button onclick="addTodo()">Add</button>
    <ul id="todoList"></ul>
  </div>
</div>

<div id="calc" class="window">
  <div class="titlebar" onmousedown="dragStart(event,this.parentElement)">
    Calculator <button onclick="closeApp('calc')">X</button>
  </div>
  <div class="content">
    <input id="calcInput">
    <button onclick="calculate()">=</button>
    <div id="calcResult"></div>
  </div>
</div>

<div id="weather" class="window">
  <div class="titlebar" onmousedown="dragStart(event,this.parentElement)">
    Weather <button onclick="closeApp('weather')">X</button>
  </div>
  <div class="content">
    <input id="cityInput">
    <button onclick="getWeather()">Check</button>
    <div id="weatherResult"></div>
  </div>
</div>

<div id="base64" class="window">
  <div class="titlebar" onmousedown="dragStart(event,this.parentElement)">
    Base64 <button onclick="closeApp('base64')">X</button>
  </div>
  <div class="content">
    <input id="b64Input">
    <button onclick="encodeB64()">Encode</button>
    <div id="b64Result"></div>

    <input id="b64DecodeInput">
    <button onclick="decodeB64()">Decode</button>
    <div id="b64DecodeResult"></div>
  </div>
</div>

<div id="ai" class="window">
  <div class="titlebar" onmousedown="dragStart(event,this.parentElement)">
    AI <button onclick="closeApp('ai')">X</button>
  </div>
  <div class="content">
    <div id="chatBox"></div>
    <input id="chatInput">
    <button onclick="sendAI()">Send</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
