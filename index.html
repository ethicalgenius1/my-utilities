<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Smart Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>⚡ My Smart Hub</h1>
  <input type="text" id="search" placeholder="Search tools...">
</header>

<main id="menu">
  <button onclick="openTool('ai')">🤖 AI Chat</button>
  <button onclick="openTool('notes')">📝 Notes</button>
  <button onclick="openTool('todo')">✅ To-Do</button>
  <button onclick="openTool('links')">🔗 Links</button>
  <button onclick="openTool('games')">🎮 Game</button>

  <!-- NEW -->
  <button onclick="openTool('timer')">⏱️ Timer</button>
  <button onclick="openTool('quotes')">💡 Quotes</button>
  <button onclick="openTool('color')">🎨 Color</button>
  <button onclick="openTool('clock')">🕒 Clock</button>
  <button onclick="openTool('password')">🔐 Password</button>
  <button onclick="openTool('calc')">🧮 Calculator</button>
<button onclick="openTool('unit')">📏 Unit Converter</button>
<button onclick="openTool('weather')">🌤️ Weather</button>
<button onclick="openTool('stopwatch')">⏱️ Stopwatch</button>
<button onclick="openTool('clipboard')">📋 Clipboard</button>
<button onclick="openTool('qr')">🔳 QR Generator</button>
<button onclick="openTool('ip')">🌐 IP Info</button>
<button onclick="openTool('battery')">🔋 Battery</button>
<button onclick="openTool('fullscreen')">🖥️ Fullscreen</button>
<button onclick="openTool('random')">🎲 Random Generator</button>
  <button onclick="openTool('googleSearch')">🌍 Google++</button>
  <button onclick="openTool('calcPro')">🧮 Pro Calc</button>
<button onclick="openTool('notesPlus')">📓 Notes+</button>
<button onclick="openTool('draw')">✏️ Draw</button>
<button onclick="openTool('files')">📁 File Viewer</button>
<button onclick="openTool('textTools')">🔤 Text Tools</button>
<button onclick="openTool('counter')">🔢 Counter</button>
<button onclick="openTool('passwordCheck')">🛡️ Password Check</button>
<button onclick="openTool('uuid')">🆔 UUID</button>
<button onclick="openTool('markdown')">📝 Markdown</button>
<button onclick="openTool('speech')">🎤 Speech</button>
<button onclick="openTool('tts')">🔊 Text to Speech</button>
<button onclick="openTool('vibrate')">📳 Vibrate</button>
<button onclick="openTool('flashlight')">🔦 Flashlight</button>
<button onclick="openTool('device')">📱 Device Info</button>
<button onclick="openTool('orientation')">🧭 Orientation</button>
<button onclick="openTool('storage')">💾 Storage</button>
<button onclick="openTool('focus')">🎯 Focus Timer</button>
<button onclick="openTool('clipboardPlus')">📋 Clipboard+</button>
<button onclick="openTool('wordCount')">📊 Word Counter</button>
<button onclick="openTool('json')">🧾 JSON Viewer</button>
</main>

<section id="tools">

<div id="ai" class="tool hidden">
  <h2>AI Chat</h2>
  <div id="chatBox"></div>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>
</div>

<div id="notes" class="tool hidden">
  <textarea id="notesArea"></textarea>
  <button onclick="saveNotes()">Save</button>
</div>

<div id="todo" class="tool hidden">
  <input id="todoInput">
  <button onclick="addTodo()">Add</button>
  <ul id="todoList"></ul>
</div>

<div id="links" class="tool hidden">
  <a href="https://youtube.com" target="_blank">YouTube</a><br>
  <a href="https://google.com" target="_blank">Google</a><br>
  <a href="https://chat.openai.com" target="_blank">ChatGPT</a><br>
  <a href="https://github.com" target="_blank">GitHub</a><br>
  <a href="https://facebook.com" target="_blank">Facebook</a><br>
  <a href="https://reddit.com" target="_blank">Reddit</a><br>
  <a href="https://twitter.com" target="_blank">Twitter</a><br>
  <a href="https://syarif-web.github.io/messenger-app/" target="_blank">My App</a><br>
</div>

<div id="games" class="tool hidden">
  <button onclick="clickGame()">CLICK FAST</button>
  <p id="score"></p>
</div>

<!-- NEW TOOLS -->

<div id="timer" class="tool hidden">
  <button onclick="startTimer()">Start 5s</button>
  <p id="timerText"></p>
</div>

<div id="quotes" class="tool hidden">
  <button onclick="newQuote()">New Quote</button>
  <p id="quoteText"></p>
</div>

<div id="color" class="tool hidden">
  <input type="color" onchange="changeColor(this.value)">
</div>

<div id="clock" class="tool hidden">
  <p id="clockText"></p>
</div>

<div id="password" class="tool hidden">
  <button onclick="genPass()">Generate</button>
  <p id="passText"></p>
</div>

  <!-- CALCULATOR -->
<div id="calc" class="tool hidden">
  <input id="calcInput" placeholder="2+2">
  <button onclick="calculate()">=</button>
  <p id="calcResult"></p>
</div>

<!-- UNIT CONVERTER -->
<div id="unit" class="tool hidden">
  <input id="kmInput" placeholder="KM">
  <button onclick="convertKM()">To Miles</button>
  <p id="unitResult"></p>
</div>

<!-- WEATHER (API) -->
<div id="weather" class="tool hidden">
  <input id="cityInput" placeholder="City">
  <button onclick="getWeather()">Get Weather</button>
  <p id="weatherResult"></p>
</div>

<!-- STOPWATCH -->
<div id="stopwatch" class="tool hidden">
  <button onclick="startSW()">Start</button>
  <button onclick="stopSW()">Stop</button>
  <p id="swText">0</p>
</div>

<!-- CLIPBOARD -->
<div id="clipboard" class="tool hidden">
  <input id="clipInput">
  <button onclick="copyText()">Copy</button>
</div>

<!-- QR GENERATOR -->
<div id="qr" class="tool hidden">
  <input id="qrInput">
  <button onclick="genQR()">Generate</button>
  <img id="qrImg">
</div>

<!-- IP INFO -->
<div id="ip" class="tool hidden">
  <button onclick="getIP()">Get My IP</button>
  <p id="ipText"></p>
</div>

<!-- BATTERY -->
<div id="battery" class="tool hidden">
  <button onclick="getBattery()">Check Battery</button>
  <p id="batteryText"></p>
</div>

<!-- FULLSCREEN -->
<div id="fullscreen" class="tool hidden">
  <button onclick="goFull()">Enter Fullscreen</button>
</div>

<!-- RANDOM -->
<div id="random" class="tool hidden">
  <button onclick="randomNum()">Random 1-100</button>
  <p id="randomText"></p>
</div>

  <div id="googleSearch" class="tool hidden">
  <script async src="https://cse.google.com/cse.js?cx=e0286dc3be5fc40a6">
</script>
<div class="gcse-search"></div>
</div>

  <!-- PRO CALC -->
<div id="calcPro" class="tool hidden">
  <input id="calcProInput" placeholder="2+2, Math.sqrt(9)">
  <button onclick="calcPro()">=</button>
  <p id="calcProResult"></p>
</div>

<!-- NOTES+ -->
<div id="notesPlus" class="tool hidden">
  <textarea id="notesPlusArea"></textarea>
  <button onclick="saveNotesPlus()">Save</button>
</div>

<!-- DRAW -->
<div id="draw" class="tool hidden">
  <canvas id="canvas" width="300" height="300" style="border:1px solid white;"></canvas>
</div>

<!-- FILE VIEWER -->
<div id="files" class="tool hidden">
  <input type="file" onchange="readFile(this)">
  <pre id="fileContent"></pre>
</div>

<!-- TEXT TOOLS -->
<div id="textTools" class="tool hidden">
  <input id="textInput">
  <button onclick="toUpper()">UPPER</button>
  <button onclick="toLower()">lower</button>
</div>

<!-- COUNTER -->
<div id="counter" class="tool hidden">
  <button onclick="countUp()">+</button>
  <p id="countText">0</p>
</div>

<!-- PASSWORD CHECK -->
<div id="passwordCheck" class="tool hidden">
  <input id="passCheck">
  <button onclick="checkPass()">Check</button>
  <p id="passStrength"></p>
</div>

<!-- UUID -->
<div id="uuid" class="tool hidden">
  <button onclick="genUUID()">Generate</button>
  <p id="uuidText"></p>
</div>

<!-- MARKDOWN -->
<div id="markdown" class="tool hidden">
  <textarea id="mdInput"></textarea>
  <button onclick="renderMD()">Render</button>
  <div id="mdOutput"></div>
</div>

<!-- SPEECH -->
<div id="speech" class="tool hidden">
  <button onclick="startSpeech()">Start</button>
  <p id="speechText"></p>
</div>

<!-- TTS -->
<div id="tts" class="tool hidden">
  <input id="ttsInput">
  <button onclick="speak()">Speak</button>
</div>

<!-- VIBRATE -->
<div id="vibrate" class="tool hidden">
  <button onclick="vibrate()">Vibrate</button>
</div>

<!-- FLASHLIGHT -->
<div id="flashlight" class="tool hidden">
  <button onclick="flash()">Flash</button>
</div>

<!-- DEVICE -->
<div id="device" class="tool hidden">
  <button onclick="deviceInfo()">Show</button>
  <p id="deviceText"></p>
</div>

<!-- ORIENTATION -->
<div id="orientation" class="tool hidden">
  <button onclick="getOrientation()">Check</button>
  <p id="oriText"></p>
</div>

<!-- STORAGE -->
<div id="storage" class="tool hidden">
  <button onclick="storageInfo()">Check</button>
  <p id="storageText"></p>
</div>

<!-- FOCUS TIMER -->
<div id="focus" class="tool hidden">
  <button onclick="startFocus()">Start 25min</button>
  <p id="focusText"></p>
</div>

<!-- CLIPBOARD+ -->
<div id="clipboardPlus" class="tool hidden">
  <input id="clipPlusInput">
  <button onclick="copyPlus()">Copy</button>
  <button onclick="pastePlus()">Paste</button>
</div>

<!-- WORD COUNTER -->
<div id="wordCount" class="tool hidden">
  <textarea id="wordInput"></textarea>
  <button onclick="countWords()">Count</button>
  <p id="wordResult"></p>
</div>

<!-- JSON VIEWER -->
<div id="json" class="tool hidden">
  <textarea id="jsonInput"></textarea>
  <button onclick="formatJSON()">Format</button>
  <pre id="jsonOutput"></pre>
</div>

</section>

<script src="script.js"></script>
</body>
</html>
