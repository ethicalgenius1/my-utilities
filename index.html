<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Web OS</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  overflow: hidden;
}

/* Desktop */
#desktop {
  width: 100vw;
  height: 100vh;
  background: #1e1e1e;
  color: white;
  padding: 10px;
}

/* Icons */
.icon {
  width: 80px;
  margin: 10px;
  cursor: pointer;
}

/* Window */
.window {
  position: absolute;
  width: 400px;
  background: white;
  border: 1px solid #aaa;
  display: none;
  top: 100px;
  left: 100px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

/* Titlebar */
.titlebar {
  background: #0078d7;
  color: white;
  padding: 5px;
  cursor: move;
  display: flex;
  justify-content: space-between;
}

/* Content */
.content {
  padding: 10px;
  color: black;
}

/* Taskbar */
#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: #111;
  display: flex;
  align-items: center;
}

#startBtn {
  width: 80px;
  background: #222;
  color: white;
  border: none;
  height: 100%;
  cursor: pointer;
}

#taskApps {
  display: flex;
  flex: 1;
}

.taskApp {
  background: #333;
  color: white;
  margin: 2px;
  padding: 5px;
  cursor: pointer;
}

#clock {
  color: white;
  padding: 0 10px;
}

/* Start Menu */
#startMenu {
  position: fixed;
  bottom: 40px;
  left: 0;
  width: 200px;
  background: #222;
  color: white;
  display: none;
}

.startItem {
  padding: 10px;
  cursor: pointer;
}

.startItem:hover {
  background: #444;
}
</style>

</head>

<body>

<!-- Desktop -->
<div id="desktop">
  <div class="icon" onclick="openApp('vault')">🔐 Vault</div>
  <div class="icon" onclick="openApp('code')">💻 Code</div>
</div>

<!-- Windows -->
<div id="vault" class="window">
  <div class="titlebar" onmousedown="dragStart(event, this.parentElement)">
    Vault
    <div>
      <button onclick="minimizeApp('vault')">-</button>
      <button onclick="closeApp('vault')">X</button>
    </div>
  </div>
  <div class="content">
    <textarea id="vaultData" style="width:100%;height:100px;"></textarea><br>
    <button onclick="saveVault()">Save</button>
    <button onclick="loadVault()">Load</button>
  </div>
</div>

<div id="code" class="window">
  <div class="titlebar" onmousedown="dragStart(event, this.parentElement)">
    Code Runner
    <div>
      <button onclick="minimizeApp('code')">-</button>
      <button onclick="closeApp('code')">X</button>
    </div>
  </div>
  <div class="content">
    <textarea id="codeInput" style="width:100%;height:100px;"></textarea><br>
    <button onclick="runCode()">Run</button>
    <pre id="codeOutput"></pre>
  </div>
</div>

<!-- Taskbar -->
<div id="taskbar">
  <button id="startBtn" onclick="toggleStart()">Start</button>
  <div id="taskApps"></div>
  <div id="clock"></div>
</div>

<!-- Start Menu -->
<div id="startMenu">
  <div class="startItem" onclick="openApp('vault')">🔐 Vault</div>
  <div class="startItem" onclick="openApp('code')">💻 Code Runner</div>
</div>

<script>

// Open App
function openApp(id) {
  let el = document.getElementById(id);
  el.style.display = "block";
  el.style.zIndex = Date.now();

  addTask(id);
}

// Close
function closeApp(id) {
  document.getElementById(id).style.display = "none";
  removeTask(id);
}

// Minimize
function minimizeApp(id) {
  document.getElementById(id).style.display = "none";
}

// Taskbar
function addTask(id) {
  if (document.getElementById("task_" + id)) return;

  let btn = document.createElement("div");
  btn.className = "taskApp";
  btn.id = "task_" + id;
  btn.innerText = id;

  btn.onclick = () => {
    let win = document.getElementById(id);
    win.style.display = "block";
    win.style.zIndex = Date.now();
  };

  document.getElementById("taskApps").appendChild(btn);
}

function removeTask(id) {
  let el = document.getElementById("task_" + id);
  if (el) el.remove();
}

// Dragging
let current = null, offsetX = 0, offsetY = 0;

function dragStart(e, el) {
  current = el;
  offsetX = e.clientX - el.offsetLeft;
  offsetY = e.clientY - el.offsetTop;
  document.onmousemove = drag;
  document.onmouseup = stopDrag;
}

function drag(e) {
  if (!current) return;
  current.style.left = (e.clientX - offsetX) + "px";
  current.style.top = (e.clientY - offsetY) + "px";
}

function stopDrag() {
  current = null;
  document.onmousemove = null;
}

// Start Menu
function toggleStart() {
  let menu = document.getElementById("startMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Clock
setInterval(() => {
  let now = new Date();
  document.getElementById("clock").innerText =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0");
}, 1000);

// Vault
function saveVault() {
  localStorage.setItem("vault", btoa(document.getElementById("vaultData").value));
}
function loadVault() {
  let data = localStorage.getItem("vault");
  if (data) document.getElementById("vaultData").value = atob(data);
}

// Code Runner
function runCode() {
  let code = document.getElementById("codeInput").value;
  try {
    let result = eval(code);
    document.getElementById("codeOutput").innerText = result;
  } catch (e) {
    document.getElementById("codeOutput").innerText = e;
  }
}

</script>

</body>
</html>
