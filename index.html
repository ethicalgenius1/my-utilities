<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My OS</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  overflow: hidden;
}

/* Desktop */
#desktop {
  width: 100vw;
  height: 100vh;
  background: #1e1e1e;
  color: white;
  padding: 10px;
}

/* Icons */
.icon {
  width: 80px;
  margin: 10px;
  cursor: pointer;
  text-align: center;
}

/* Window */
.window {
  position: absolute;
  width: 400px;
  background: white;
  border: 1px solid #aaa;
  display: none;
  top: 100px;
  left: 100px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

/* Titlebar */
.titlebar {
  background: #0078d7;
  color: white;
  padding: 5px;
  cursor: move;
  display: flex;
  justify-content: space-between;
}

/* Content */
.content {
  padding: 10px;
  color: black;
}

/* Taskbar */
#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: #111;
  color: white;
  display: flex;
  align-items: center;
  padding: 0 10px;
}
</style>

</head>

<body>

<!-- Desktop -->
<div id="desktop">
  <div class="icon" onclick="openApp('vault')">🔐 Vault</div>
  <div class="icon" onclick="openApp('code')">💻 Code</div>
</div>

<!-- VAULT -->
<div id="vault" class="window">
  <div class="titlebar" onmousedown="dragStart(event, this.parentElement)">
    Vault
    <button onclick="closeApp('vault')">X</button>
  </div>
  <div class="content">
    <textarea id="vaultData" style="width:100%;height:100px;"></textarea><br>
    <button onclick="saveVault()">Save</button>
    <button onclick="loadVault()">Load</button>
  </div>
</div>

<!-- CODE RUNNER -->
<div id="code" class="window">
  <div class="titlebar" onmousedown="dragStart(event, this.parentElement)">
    Code Runner
    <button onclick="closeApp('code')">X</button>
  </div>
  <div class="content">
    <textarea id="codeInput" style="width:100%;height:100px;"></textarea><br>
    <button onclick="runCode()">Run</button>
    <pre id="codeOutput"></pre>
  </div>
</div>

<!-- Taskbar -->
<div id="taskbar">MyOS</div>

<script>

// Open / Close
function openApp(id) {
  let el = document.getElementById(id);
  el.style.display = "block";
  el.style.zIndex = Date.now();
}

function closeApp(id) {
  document.getElementById(id).style.display = "none";
}

// Dragging
let current = null;
let offsetX = 0;
let offsetY = 0;

function dragStart(e, el) {
  current = el;
  offsetX = e.clientX - el.offsetLeft;
  offsetY = e.clientY - el.offsetTop;
  document.onmousemove = drag;
  document.onmouseup = stopDrag;
}

function drag(e) {
  if (!current) return;
  current.style.left = (e.clientX - offsetX) + "px";
  current.style.top = (e.clientY - offsetY) + "px";
}

function stopDrag() {
  current = null;
  document.onmousemove = null;
}

// Vault
function saveVault() {
  localStorage.setItem("vault", btoa(document.getElementById("vaultData").value));
}

function loadVault() {
  let data = localStorage.getItem("vault");
  if (data) document.getElementById("vaultData").value = atob(data);
}

// Code Runner
function runCode() {
  let code = document.getElementById("codeInput").value;
  try {
    let result = eval(code);
    document.getElementById("codeOutput").innerText = result;
  } catch (e) {
    document.getElementById("codeOutput").innerText = e;
  }
}

</script>

</body>
</html>
