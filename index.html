<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Smart Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>⚡ My Smart Hub</h1>
  <input type="text" id="search" placeholder="Search tools...">
</header>

<main id="menu">
  <button onclick="openTool('ai')">🤖 AI Chat</button>
  <button onclick="openTool('notes')">📝 Notes</button>
  <button onclick="openTool('todo')">✅ To-Do</button>
  <button onclick="openTool('links')">🔗 Links</button>
  <button onclick="openTool('games')">🎮 Game</button>

  <!-- NEW -->
  <button onclick="openTool('timer')">⏱️ Timer</button>
  <button onclick="openTool('quotes')">💡 Quotes</button>
  <button onclick="openTool('color')">🎨 Color</button>
  <button onclick="openTool('clock')">🕒 Clock</button>
  <button onclick="openTool('password')">🔐 Password</button>
  <button onclick="openTool('calc')">🧮 Calculator</button>
<button onclick="openTool('unit')">📏 Unit Converter</button>
<button onclick="openTool('weather')">🌤️ Weather</button>
<button onclick="openTool('stopwatch')">⏱️ Stopwatch</button>
<button onclick="openTool('clipboard')">📋 Clipboard</button>
<button onclick="openTool('qr')">🔳 QR Generator</button>
<button onclick="openTool('ip')">🌐 IP Info</button>
<button onclick="openTool('battery')">🔋 Battery</button>
<button onclick="openTool('fullscreen')">🖥️ Fullscreen</button>
<button onclick="openTool('random')">🎲 Random Generator</button>
</main>

<section id="tools">

<div id="ai" class="tool hidden">
  <h2>AI Chat</h2>
  <div id="chatBox"></div>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>
</div>

<div id="notes" class="tool hidden">
  <textarea id="notesArea"></textarea>
  <button onclick="saveNotes()">Save</button>
</div>

<div id="todo" class="tool hidden">
  <input id="todoInput">
  <button onclick="addTodo()">Add</button>
  <ul id="todoList"></ul>
</div>

<div id="links" class="tool hidden">
  <a href="https://youtube.com" target="_blank">YouTube</a><br>
  <a href="https://google.com" target="_blank">Google</a>
</div>

<div id="games" class="tool hidden">
  <button onclick="clickGame()">CLICK FAST</button>
  <p id="score"></p>
</div>

<!-- NEW TOOLS -->

<div id="timer" class="tool hidden">
  <button onclick="startTimer()">Start 5s</button>
  <p id="timerText"></p>
</div>

<div id="quotes" class="tool hidden">
  <button onclick="newQuote()">New Quote</button>
  <p id="quoteText"></p>
</div>

<div id="color" class="tool hidden">
  <input type="color" onchange="changeColor(this.value)">
</div>

<div id="clock" class="tool hidden">
  <p id="clockText"></p>
</div>

<div id="password" class="tool hidden">
  <button onclick="genPass()">Generate</button>
  <p id="passText"></p>
</div>

</section>

<script src="script.js"></script>
</body>
</html>
